<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
<script>
    // 1. CONFIG FIREBASE (Tetap gunakan milik Anda)
    const firebaseConfig = {
        apiKey: "AIzaSyDq8cuvGJJrWD9_R7NoShQTRWhrj0-CNVc",
        authDomain: "audit-digital-jhl-v2.firebaseapp.com",
        projectId: "audit-digital-jhl-v2",
        storageBucket: "audit-digital-jhl-v2.firebasestorage.app",
        messagingSenderId: "839003631596",
        appId: "1:839003631596:web:64113b8bd1a38bf5d31ac9"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let corporateChart = null;
    let individualChart = null;

    // UPDATE: Nama Domain Baru Sesuai List Pertanyaan Anda
    const globalCategories = [
        "Data Architecture & Tracking",   // Domain 1
        "Performance Ads Strategy",       // Domain 2
        "SEO & Web Ecosystem",            // Domain 3
        "Revenue Sync & Distribution",    // Domain 4
        "Content & Org Strategy"          // Domain 5
    ];

    function initAdmin() {
        firebase.auth().onAuthStateChanged(user => {
            const authView = document.getElementById('auth-view');
            const dashView = document.getElementById('dashboard-view');
            if (user && !user.isAnonymous) {
                authView.classList.add('hidden');
                dashView.classList.remove('hidden');
                loadData(); 
                loadCorporateStats(); 
            } else {
                authView.classList.remove('hidden');
                dashView.classList.add('hidden');
            }
        });
    }

    // Load Data Tabel
    function loadData() {
        db.collection('submissions').orderBy('timestamp', 'desc').onSnapshot(snap => {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            document.getElementById('total-count').innerText = snap.size;

            snap.forEach(doc => {
                const data = doc.data();
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="p-8 font-black text-slate-800 uppercase italic tracking-tighter">${data.hotelName || 'Unit Unknown'}</td>
                    <td class="p-8 font-black text-indigo-600 text-2xl tracking-tighter">${Math.round(data.overall || 0)}%</td>
                    <td class="p-8">
                        <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${data.overall > 70 ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                            ${data.overall > 70 ? 'Advanced' : 'Standard'}
                        </span>
                    </td>
                    <td class="p-8 text-slate-400 text-xs">${data.timestamp ? new Date(data.timestamp).toLocaleString('id-ID') : '-'}</td>
                    <td class="p-8 text-right">
                        <button onclick='showDetail(${JSON.stringify(data)})' class="bg-slate-800 text-white text-[10px] font-black uppercase px-6 py-3 rounded-2xl hover:bg-indigo-600 transition shadow-lg">Detail</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    // Load Statistik Kumulatif untuk Radar Utama
    async function loadCorporateStats() {
        const snap = await db.collection('submissions').get();
        if (snap.empty) return;

        let sumScores = [0, 0, 0, 0, 0];
        snap.forEach(doc => {
            const d = doc.data();
            if (d.scores) {
                d.scores.forEach((s, i) => { sumScores[i] += (s || 0); });
            }
        });

        const avgScores = sumScores.map(val => Math.round(val / snap.size));
        renderRadarChart('corporateRadarChart', avgScores, 'Rata-Rata Digital Maturity JHL', true);
    }

    // Fungsi Render Radar Chart
    function renderRadarChart(canvasId, scoresData, labelName, isCorporate) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        if (isCorporate && corporateChart) corporateChart.destroy();
        if (!isCorporate && individualChart) individualChart.destroy();

        const config = {
            type: 'radar',
            data: {
                labels: globalCategories,
                datasets: [
                    {
                        label: labelName,
                        data: scoresData,
                        fill: true,
                        backgroundColor: 'rgba(251, 191, 36, 0.2)',
                        borderColor: '#fbbf24',
                        pointBackgroundColor: '#fbbf24',
                        borderWidth: 2
                    },
                    {
                        label: 'Standard Target',
                        data: [100, 100, 100, 100, 100],
                        fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.05)',
                        borderColor: '#6366f1',
                        borderWidth: 1,
                        borderDash: [5, 5]
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        suggestedMin: 0,
                        suggestedMax: 100,
                        ticks: { display: false, stepSize: 20 },
                        pointLabels: { font: { size: 9, weight: '700' }, color: '#64748b' }
                    }
                },
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }
            }
        };

        if (isCorporate) corporateChart = new Chart(ctx, config);
        else individualChart = new Chart(ctx, config);
    }

    // Tampilkan Modal Detail
    function showDetail(data) {
        document.getElementById('modal-hotel-name').innerText = data.hotelName;
        document.getElementById('modal-date').innerText = `Input: ${data.timestamp ? new Date(data.timestamp).toLocaleString('id-ID') : '-'}`;
        document.getElementById('modal-overall-score').innerText = `${Math.round(data.overall)}%`;

        renderRadarChart('individualRadarChart', data.scores, 'Unit Performance', false);
        document.getElementById('detail-modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }
    function logout() { firebase.auth().signOut(); }

    window.onload = initAdmin;
</script>
