<script>
    // 1. DATA STRUKTUR (Tetap Ada)
    const CATEGORIES = [
        { title: "Data & Tracking", questions: ["Setup GTM (Global)","Integrasi GA4 E-commerce","Meta Pixel & CAPI","Form Submission Tracking","WhatsApp Event Tracking","E-comm Checkout Tracking","Server-Side GTM Setup","Cross-Domain Tracking","Audit Kebocoran Data","Data Validation Routine"] },
        { title: "Performance Ads", questions: ["Google Hotel Ads (GHA)","Brand Protection Ads","Dynamic Creative (DCO)","Sync Audience PMS","Retargeting Abandoned Booking","Share of Voice (Ads)","tROAS Optimization","A/B Testing Visual","Advantage+ Campaigns","Budget vs Demand Sync"] },
        { title: "SEO & Content", questions: ["GBP (Maps) Optimization","Core Web Vitals Score","Content Strategy Lokal","Schema Markup Implementation","Quality Backlinks Profile","Image & Video Optimization","Internal Linking Web","Search Console Monitoring","Meta Titles Optimization","UI/UX Booking Engine"] },
        { title: "Revenue Sync", questions: ["Rate Parity Monitoring","Demand Forecasting Tools","Members-only Web Promo","Sync Website vs OTA","RGI Strategy Digital","Digital Upselling Tool","Online Reputation Impact","Direct vs OTA Mix","Geo-Targeting Pricing","Digital Price Audit"] },
        { title: "Strategy & Mgmt", questions: ["Content Pillar Plan","Vertical Video Strategy","CRM/Email Automation","Chatbot/DM Automation","Unified Monthly Report","Heatmap Analysis","Influencer ROI Tracking","Asset Management (DAM)","Social Crisis Protocol","Admin Efficiency Tools"] }
    ];

    let currentStep = 0;
    let hotelName = "";
    let userScores = Array(5).fill(0).map(() => Array(10).fill(0));
    let liveRadar = null;
    let db;

    // 2. CONFIG (WAJIB: Isi API Key dari Console Anda)
    const firebaseConfig = {
        apiKey: "MASUKKAN_API_KEY_ANDA",
        authDomain: "jhl-audit.firebaseapp.com",
        projectId: "jhl-audit",
        storageBucket: "jhl-audit.appspot.com",
        messagingSenderId: "NOMOR_SENDER_ID",
        appId: "APP_ID_ANDA"
    };

    const appId = "audit-digital-jhl-v2";

    // 3. PERBAIKAN UTAMA: Fungsi InitApp
    async function initApp() {
        try {
            // Pastikan menggunakan 'firebase.initializeApp' karena mode COMPAT
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig); 
            }
            db = firebase.firestore();
            await firebase.auth().signInAnonymously();
            console.log("Firebase Connected");
        } catch (e) {
            console.error("Firebase Connection Error:", e);
        } finally {
            // Loader PASTI tertutup jika baris ini dijalankan
            const loader = document.getElementById('loader');
            if (loader) loader.style.display = 'none';
        }
    }

    // 4. FUNGSI NAVIGASI & RENDER
    function switchView(viewId) {
        ['landing', 'survey', 'success', 'admin'].forEach(v => {
            const el = document.getElementById('view-' + v);
            if(el) el.classList.add('hidden');
        });
        document.getElementById('view-' + viewId).classList.remove('hidden');
        if(viewId === 'admin') setupAdminListener();
    }

    function startSurvey() {
        hotelName = document.getElementById('hotel-name-input').value.trim();
        if(!hotelName) return alert("Masukkan nama unit.");
        document.getElementById('display-hotel-name').innerText = hotelName;
        renderSurvey();
        initRadar();
        switchView('survey');
    }

    function renderSurvey() {
        const container = document.getElementById('survey-container');
        container.innerHTML = '';
        CATEGORIES.forEach((cat, cIdx) => {
            const div = document.createElement('div');
            div.className = `step-content ${cIdx === currentStep ? 'active' : ''}`;
            let html = `<div class="bg-slate-50 p-6 border-b"><h2 class="text-xl font-black text-slate-800 uppercase">${cat.title}</h2></div><div class="survey-grid min-w-[600px]"><div class="grid-cell grid-header grid-label">Indikator</div>${[1,2,3,4,5].map(i => `<div class="grid-cell grid-header">${i}</div>`).join('')}`;
            cat.questions.forEach((q, qIdx) => {
                html += `<div class="grid-cell grid-label font-bold">${q}</div>` + [1,2,3,4,5].map(v => `<div class="grid-cell"><input type="radio" name="q_${cIdx}_${qIdx}" value="${v}" onchange="userScores[${cIdx}][${qIdx}]=${v}; updateRadar();" ${userScores[cIdx][qIdx] == v ? 'checked' : ''}></div>`).join('');
            });
            div.innerHTML = html + `</div>`;
            container.appendChild(div);
        });
        updateUI();
    }

    function updateUI() {
        document.getElementById('step-info-top').innerText = `Progress: ${currentStep + 1}/5`;
        document.getElementById('prev-btn').style.visibility = currentStep === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentStep === 4 ? "Submit" : "Lanjut";
    }

    function moveStep(dir) {
        if(dir === 1 && userScores[currentStep].includes(0)) return alert("Mohon lengkapi semua poin.");
        currentStep += dir;
        if(currentStep > 4) return submitData();
        renderSurvey();
    }

    function initRadar() {
        const ctx = document.getElementById('liveRadar');
        if(liveRadar) liveRadar.destroy();
        liveRadar = new Chart(ctx, {
            type: 'radar',
            data: { labels: CATEGORIES.map(c => c.title), datasets: [{ data: [0,0,0,0,0], borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.1)' }] },
            options: { scales: { r: { min: 0, max: 100 } }, plugins: { legend: { display: false } } }
        });
    }

    function updateRadar() {
        if(!liveRadar) return;
        liveRadar.data.datasets[0].data = userScores.map(cat => (cat.reduce((a,b)=>a+b,0)/50)*100);
        liveRadar.update();
    }

    async function submitData() {
        const averages = userScores.map(cat => (cat.reduce((a,b)=>a+b,0)/50)*100);
        const overall = averages.reduce((a,b)=>a+b,0)/5;
        try {
            const path = `artifacts/${appId}/public/data/submissions`;
            await db.collection(path).add({ hotelName, scores: averages, overall, timestamp: new Date().toISOString() });
            document.getElementById('success-hotel-name').innerText = hotelName;
            switchView('success');
        } catch (e) {
            console.error("Error saving:", e);
            alert("Gagal mengirim data.");
        }
    }

    function setupAdminListener() {
        const path = `artifacts/${appId}/public/data/submissions`;
        db.collection(path).orderBy('overall', 'desc').onSnapshot(snap => {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            document.getElementById('total-count').innerText = snap.size;
            snap.forEach(doc => {
                const data = doc.data();
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="p-4 font-bold">${data.hotelName}</td><td class="p-4 font-black">${Math.round(data.overall)}%</td><td class="p-4">${data.overall > 70 ? 'Advanced' : 'Standard'}</td><td class="p-4 text-right"><button class="text-indigo-600 text-xs font-bold">Detail</button></td>`;
                tbody.appendChild(tr);
            });
        }, err => {
            console.error("Admin Error:", err);
            document.getElementById('admin-table-body').innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-500">Izin Database Ditolak.</td></tr>`;
        });
    }

    window.onload = initApp;
</script>
