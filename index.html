<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHL Digital Maturity Audit - Survey</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Custom Radio Styling */
        input[type="radio"] {
            appearance: none;
            width: 24px; height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        input[type="radio"]:checked {
            border-color: #6366f1;
            background: #6366f1;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }
        input[type="radio"]:checked::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 8px; height: 8px;
            background: white;
            border-radius: 50%;
        }

        .step-content { display: none; }
        .step-content.active { display: block; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 bg-[#0f172a] z-[100] flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <p class="text-[10px] font-black tracking-[0.4em] uppercase text-indigo-400">Initializing Intelligence System</p>
    </div>

    <div id="view-landing" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-xl w-full text-center space-y-12">
            <div class="w-24 h-24 ai-gradient rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl rotate-6 hover:rotate-0 transition-transform duration-500">
                <span class="text-white font-black text-4xl italic">JHL</span>
            </div>
            <div class="space-y-4">
                <h1 class="text-5xl font-black tracking-tighter uppercase italic leading-none">Digital Maturity <br><span class="text-indigo-500">Audit 2024</span></h1>
                <p class="text-slate-400 font-bold text-sm tracking-[0.2em] uppercase">Executive Evaluation for Business Units</p>
            </div>
            <div class="glass-card p-10 rounded-[3rem] space-y-6">
                <input type="text" id="hotel-name-input" placeholder="Nama Unit (Contoh: JHL Solitaire)" 
                    class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl text-white outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-center text-lg">
                <button onclick="startSurvey()" class="w-full ai-gradient text-white p-5 rounded-2xl font-black uppercase tracking-widest hover:scale-[1.02] transition shadow-xl text-xs">Begin Audit</button>
            </div>
        </div>
    </div>

    <div id="view-survey" class="hidden min-h-screen">
        <header class="p-8 flex justify-between items-center max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 ai-gradient rounded-xl flex items-center justify-center font-black italic text-sm">J</div>
                <div>
                    <h2 id="display-hotel-name" class="font-black uppercase italic tracking-tighter text-lg">Unit</h2>
                    <p id="step-info-top" class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">Progress: 1/5</p>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-8 py-4 grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8 space-y-8 pb-20">
                <div id="survey-container">
                    </div>
                
                <div class="flex justify-between items-center">
                    <button id="prev-btn" onclick="moveStep(-1)" class="px-8 py-4 font-black text-slate-500 text-xs uppercase tracking-widest hover:text-white transition">Previous</button>
                    <button id="next-btn" onclick="moveStep(1)" class="px-12 py-4 ai-gradient text-white rounded-2xl font-black shadow-xl uppercase text-xs tracking-widest hover:scale-105 transition">Continue</button>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="glass-card p-10 rounded-[3rem] sticky top-12">
                    <h4 class="text-[10px] font-black uppercase text-indigo-400 tracking-[0.3em] mb-8 italic text-center">Live Capability Map</h4>
                    <div class="h-72">
                        <canvas id="liveRadar"></canvas>
                    </div>
                    <div class="mt-8 pt-8 border-t border-white/5">
                        <p class="text-[10px] font-bold text-slate-500 italic text-center leading-relaxed">Grafik akan terupdate secara real-time berdasarkan jawaban Anda.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="view-success" class="hidden min-h-screen flex items-center justify-center p-6 text-center">
        <div class="max-w-lg space-y-8">
            <div class="w-24 h-24 bg-emerald-500/20 text-emerald-500 rounded-[2.5rem] flex items-center justify-center mx-auto shadow-2xl border border-emerald-500/30">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </div>
            <div class="space-y-4">
                <h1 class="text-5xl font-black uppercase italic tracking-tighter">Audit Secured</h1>
                <p class="text-slate-400 font-bold italic">Data untuk <span id="success-hotel-name" class="text-white"></span> telah berhasil diunggah ke Digital Hub Korporat.</p>
            </div>
            <button onclick="location.reload()" class="bg-white text-slate-900 px-12 py-5 rounded-2xl font-black uppercase text-xs tracking-[0.2em] hover:bg-indigo-500 hover:text-white transition shadow-2xl">Return to Portal</button>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE (Sama dengan sebelumnya)
        const firebaseConfig = {
            apiKey: "AIzaSyDq8cuvGJJrWD9_R7NoShQTRWhrj0-CNVc",
            authDomain: "audit-digital-jhl-v2.firebaseapp.com",
            projectId: "audit-digital-jhl-v2",
            storageBucket: "audit-digital-jhl-v2.firebasestorage.app",
            messagingSenderId: "839003631596",
            appId: "1:839003631596:web:64113b8bd1a38bf5d31ac9"
        };

        const CATEGORIES = [
            { title: "Data & Tracking", questions: ["Validasi data real-time menggunakan GTM Debug Mode.", "Setup GTM untuk pelacakan klik tombol reservasi.", "Integrasi GA4 E-commerce.", "Konfigurasi Server-Side Tracking.", "Implementasi Meta Pixel & CAPI.", "Cross-Domain tracking antara hotel & BE.", "Pengaturan Custom Dimensions di GA4.", "Pelacakan formulir MICE/Wedding.", "Setup pelacakan klik WhatsApp.", "Audit data leakage antar halaman."] },
            { title: "Performance Ads", questions: ["Optimasi GHA & Pay-per-Stay.", "Manajemen SEM Brand Protection.", "Setup Dynamic Creative Optimization.", "Pembuatan Custom Audiences database PMS.", "Strategi Retargeting Abandoned Booking.", "Analisis Impression Share vs Competitor.", "Pengaturan Bid Strategy (tROAS).", "A/B Testing judul & visual iklan.", "Advantage+ Shopping F&B.", "Manajemen budget berbasis occupancy."] },
            { title: "SEO & Web Ecosystem", questions: ["Optimasi Google Business Profile.", "Audit Technical SEO (Core Web Vitals).", "Manajemen konten blog keyword-based.", "Penerapan Schema Markup Hotel.", "Analisis Backlink & Link Building.", "Optimasi Image SEO (WebP format).", "Manajemen Internal Linking Promo.", "Monitoring GSC Indexing.", "Optimasi Meta-Titles vs OTA.", "Audit UI/UX Website Booking Flow."] },
            { title: "Revenue Sync", questions: ["Pemahaman Rate Parity & Ad Cost.", "Analisis Demand Forecast Digital.", "Integrasi Member Rate di Digital Channel.", "Sinkronisasi Website vs OTA via CM.", "Analisis kontribusi RGI Digital.", "Strategi Digital Upselling.", "Reputation Management vs Conversion.", "Analisis CPA Digital vs Komisi OTA.", "Pengaturan penawaran Geo-Targeting.", "Audit konsistensi foto Website vs OTA."] },
            { title: "Content & Org", questions: ["Content Pillars Conversion-Oriented.", "Scripting Reels/TikTok Direct Booking.", "Manajemen Database Email tamu.", "Otomasi chatbot/DM leads.", "Laporan bulanan terpadu (Ads/Web/Rev).", "Analisis Heatmap UX.", "Kolaborasi Influencer berbasis ROI.", "Alokasi waktu Strategis vs Admin.", "Manajemen Digital Asset (DAM).", "Strategi Krisis Marketing."] }
        ];

        let currentStep = 0, hotelName = "", liveRadar = null, db = null;
        let userScores = Array(5).fill(0).map(() => Array(10).fill(0));

        async function initApp() {
            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                await firebase.auth().signInAnonymously();
                switchView('landing');
            } catch (e) { alert("Sistem Error: " + e.message); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        function switchView(id) {
            ['landing', 'survey', 'success'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+id).classList.remove('hidden');
        }

        function startSurvey() {
            hotelName = document.getElementById('hotel-name-input').value.trim();
            if(!hotelName) return alert("Masukkan Nama Unit Hotel.");
            document.getElementById('display-hotel-name').innerText = hotelName;
            renderSurvey(); initRadar(); switchView('survey');
        }

        function renderSurvey() {
            const container = document.getElementById('survey-container');
            container.innerHTML = '';
            
            CATEGORIES.forEach((cat, cIdx) => {
                const div = document.createElement('div');
                div.className = `step-content ${cIdx === currentStep ? 'active' : ''} space-y-6`;
                
                let html = `
                    <div class="mb-10">
                        <span class="text-indigo-400 font-black text-[10px] uppercase tracking-[0.4em]">Section ${cIdx + 1}</span>
                        <h2 class="text-4xl font-black italic uppercase tracking-tighter mt-2">${cat.title}</h2>
                    </div>
                    <div class="space-y-3">
                `;

                cat.questions.forEach((q, qIdx) => {
                    html += `
                        <div class="glass-card p-6 rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-6 hover:bg-white/5 transition">
                            <p class="font-bold text-sm text-slate-300 italic tracking-tight flex-1"><span class="text-indigo-500 mr-2">/</span> ${q}</p>
                            <div class="flex items-center gap-4 bg-black/20 p-2 rounded-xl border border-white/5">
                                <span class="text-[9px] font-black text-slate-600 mr-2 uppercase">Score</span>
                                ${[1,2,3,4,5].map(v => `
                                    <label class="flex flex-col items-center gap-1 cursor-pointer">
                                        <input type="radio" name="q_${cIdx}_${qIdx}" value="${v}" 
                                            onchange="userScores[${cIdx}][${qIdx}]=${v}; updateRadar();" 
                                            ${userScores[cIdx][qIdx] == v ? 'checked' : ''}>
                                        <span class="text-[8px] font-black text-slate-500">${v}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                
                div.innerHTML = html + `</div>`;
                container.appendChild(div);
            });
            updateUI();
        }

        function updateUI() {
            document.getElementById('step-info-top').innerText = `Progress: ${currentStep + 1}/5`;
            document.getElementById('prev-btn').style.opacity = currentStep === 0 ? '0' : '1';
            document.getElementById('next-btn').innerText = currentStep === 4 ? "Complete Audit" : "Continue";
        }

        function moveStep(dir) {
            if(dir === 1 && userScores[currentStep].includes(0)) return alert("Mohon berikan skor pada semua indikator.");
            currentStep += dir;
            if(currentStep > 4) return submitData();
            renderSurvey();
        }

        function initRadar() {
            const ctx = document.getElementById('liveRadar').getContext('2d');
            if(liveRadar) liveRadar.destroy();
            liveRadar = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: CATEGORIES.map(c => c.title),
                    datasets: [{
                        data: [0,0,0,0,0],
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.2)',
                        borderWidth: 3, pointRadius: 0
                    }]
                },
                options: {
                    scales: { r: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false }, pointLabels: { font: { size: 8, weight: '800' }, color: '#94a3b8' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateRadar() {
            if(!liveRadar) return;
            liveRadar.data.datasets[0].data = userScores.map(cat => (cat.reduce((a,b)=>a+b,0)/50)*100);
            liveRadar.update();
        }

        async function submitData() {
            const averages = userScores.map(cat => (cat.reduce((a,b)=>a+b,0)/50)*100);
            const overall = averages.reduce((a,b)=>a+b,0)/5;
            document.getElementById('loader').classList.remove('hidden');
            try {
                await db.collection('submissions').add({ hotelName, scores: averages, overall, timestamp: new Date().toISOString() });
                document.getElementById('success-hotel-name').innerText = hotelName;
                switchView('success');
            } catch (e) { alert("Submit Error: " + e.message); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        window.onload = initApp;
    </script>
</body>
</html>
